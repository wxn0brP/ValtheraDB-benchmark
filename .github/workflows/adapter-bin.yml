name: adapter-bin

on:
  workflow_dispatch:
    inputs:
      skip_commit:
        description: "Skip commit results"
        required: false
        type: boolean
        default: false

jobs:
  run-benchmark:
    strategy:
      matrix:
        include:
          - ver: "bun"
            os: "ubuntu-latest"
          - ver: "24"
            os: "ubuntu-latest"
          - ver: "22"
            os: "ubuntu-latest"
          - ver: "20"
            os: "ubuntu-latest"
          - ver: "24"
            os: "windows-latest"
          - ver: "bun"
            os: "windows-latest"
          - ver: "24"
            os: "macos-latest"
          - ver: "bun"
            os: "macos-latest"

    uses: ./.github/workflows/run-single.yml
    with:
      opts: '["./valthera-bin-test-$$.vdb"]'
      adapter: "bin"
      ver: ${{ matrix.ver }}
      os: ${{ matrix.os }}
      install: "@wxn0brp/db-storage-bin@0.110.0-alpha.0 @wxn0brp/db-core@0.11.0"
      setup: ""
    secrets: inherit

  commit-results:
    needs: run-benchmark
    if: ${{ github.event.inputs.skip_commit != 'true' }}
    uses: ./.github/workflows/commit-results.yml
    with:
      adapter: "bin"
    secrets: inherit
