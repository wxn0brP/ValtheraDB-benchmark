name: adapter-dir

on:
  workflow_dispatch:

jobs:
  run-benchmark:
    strategy:
      matrix:
        include:
          - ver: "bun"
            os: "ubuntu-latest"
          - ver: "24"
            os: "ubuntu-latest"

    uses: ./.github/workflows/run-single.yml
    with:
      opts: '["/tmp/valthera-dir-test"]'
      adapter: "dir"
      ver: ${{ matrix.ver }}
      os: ${{ matrix.os }}
      install: ""
    secrets: inherit

  commit-results:
    needs: run-benchmark
    uses: ./.github/workflows/commit-results.yml
    with:
      adapter: "dir"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    secrets: inherit
