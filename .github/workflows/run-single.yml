name: run-single

on:
  workflow_call:
    inputs:
      opts:
        required: true
        type: string
      adapter:
        required: true
        type: string
      ver:
        required: true
        type: string
      os:
        required: true
        type: string
      install:
        required: false
        type: string
      setup:
        required: false
        type: string

jobs:
  benchmark-single:
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # ---- for bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        if: inputs.ver == 'bun'
        with:
          bun-version: latest

      - name: Install dependencies (Bun)
        if: inputs.ver == 'bun'
        run: bun install

      - name: Install additional dependencies (Bun)
        if: inputs.ver == 'bun' && inputs.install
        run: bun add ${{ inputs.install }}

      - name: Custom setup (Bun)
        if: inputs.ver == 'bun' && inputs.setup
        run: ${{ inputs.setup }}

      - name: Build (Bun)
        if: inputs.ver == 'bun'
        run: bun run build

      - name: Run benchmark for adapter (Bun)
        if: inputs.ver == 'bun'
        env:
          VALTHERA_MASTER: ${{ inputs.adapter }}
          VALTHERA_MASTER_OPTS: ${{ inputs.opts }}
        run: bun run dist/index.js

      # ---- for node
      - name: Setup Node.js
        uses: actions/setup-node@v6
        if: inputs.ver != 'bun'
        with:
          node-version: ${{ inputs.ver }}

      - name: Install dependencies (Node.js)
        if: inputs.ver != 'bun'
        run: npm install

      - name: Install additional dependencies (Node.js)
        if: inputs.ver != 'bun' && inputs.install
        run: npm install ${{ inputs.install }}

      - name: Custom setup (Node.js)
        if: inputs.ver != 'bun' && inputs.setup
        run: ${{ inputs.setup }}

      - name: Build (Node.js)
        if: inputs.ver != 'bun'
        run: npm run build

      - name: Run benchmark for adapter (Node.js)
        if: inputs.ver != 'bun'
        env:
          VALTHERA_MASTER: ${{ inputs.adapter }}
          VALTHERA_MASTER_OPTS: ${{ inputs.opts }}
        run: node dist/index.js

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.adapter }}-${{ inputs.ver }}-${{ inputs.os }}
          path: result.json
